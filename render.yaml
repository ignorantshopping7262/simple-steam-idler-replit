services:
  - type: web
    name: simple-site-backend
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: ACCOUNT_NAME
        value: "YOUR_STEAM_LOGIN_NAME"
      - key: STEAM_SESSION_ID
        value: "YOUR_SESSION_ID"
      - key: STEAM_LOGIN_SECURE
        value: "YOUR_LOGIN_SECURE"
      - key: APP_ID
        value: "730"
